<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM - Gestor de Clientes</title>
  <style>
    :root {
      --bg: #1a1a1a; --bg2: #222; --bg3: #2a2a2a; --bg4: #333;
      --text: #fff; --text2: #bbb; --text3: #888;
      --border: #333; --border2: #444;
      --green: #6f8; --red: #f88; --yellow: #fa0; --blue: #6af;
      --green-bg: #1a3a2a; --red-bg: #3a1a1a; --yellow-bg: #3a2a0a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* Layout */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .nav { display: flex; gap: 4px; }
    .nav-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; transition: all 0.15s; }
    .nav-btn.active { background: var(--green-bg); color: var(--green); border-color: var(--green); }
    .content { flex: 1; overflow-y: auto; padding: 20px; }
    .screen { display: none; }
    .screen.active { display: block; }
    
    /* Cards */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    
    /* Buscador */
    .search-box { position: relative; margin-bottom: 20px; }
    .search-box input { width: 100%; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); border-radius: 10px; font-size: 14px; outline: none; }
    .search-box input:focus { border-color: var(--green); }
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; z-index: 100; max-height: 200px; overflow-y: auto; margin-top: 4px; }
    .search-item { padding: 10px 16px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); }
    .search-item:hover { background: var(--bg3); }
    .search-item:last-child { border-bottom: none; }
    
    /* Ficha cliente */
    .ficha-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .ficha-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--green-bg); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .ficha-nombre { font-size: 18px; font-weight: 600; }
    .ficha-estado { font-size: 12px; margin-top: 2px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat-box { background: var(--bg3); border-radius: 8px; padding: 10px; text-align: center; }
    .stat-num { font-size: 20px; font-weight: 700; color: var(--green); }
    .stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }
    
    .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
    .tag-cat { background: var(--bg4); color: var(--text2); }
    .tag-cat.top { background: var(--green-bg); color: var(--green); }
    
    .alerta { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .alerta.verde { background: var(--green-bg); color: var(--green); }
    .alerta.roja { background: var(--red-bg); color: var(--red); }
    .alerta.amarilla { background: var(--yellow-bg); color: var(--yellow); }
    
    .historial-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .historial-item:last-child { border-bottom: none; }
    .historial-producto { color: var(--text); }
    .historial-meta { color: var(--text3); text-align: right; }
    .historial-cat { display: inline-block; font-size: 10px; padding: 2px 6px; background: var(--bg4); border-radius: 3px; color: var(--text2); }
    
    /* Formulario venta */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 11px; color: var(--text3); }
    input, select { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 10px; border-radius: 6px; font-size: 13px; width: 100%; outline: none; }
    input:focus, select:focus { border-color: var(--green); }
    input[list] { cursor: text; }
    button.primary { background: var(--green-bg); border: 1px solid var(--green); color: var(--green); padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; width: 100%; margin-top: 12px; transition: all 0.15s; }
    button.primary:hover { background: #2a5a3a; }
    
    /* Listado */
    .filtros { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filtro-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-size: 11px; }
    .filtro-btn.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }
    .cliente-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .cliente-row:hover { background: var(--bg3); margin: 0 -8px; padding: 10px 8px; border-radius: 6px; }
    .cliente-info { flex: 1; }
    .cliente-nombre { font-size: 13px; font-weight: 500; }
    .cliente-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .estado-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
    .estado-activo { background: var(--green-bg); color: var(--green); }
    .estado-contactar { background: var(--yellow-bg); color: var(--yellow); }
    .estado-inactivo { background: var(--red-bg); color: var(--red); }
    
    /* Estadísticas */
    .stats-big { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-big { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-big-num { font-size: 28px; font-weight: 700; }
    .stat-big-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
    .bar-label { width: 120px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--green); border-radius: 3px; }
    .bar-val { width: 30px; text-align: right; color: var(--text3); }
    
    /* Migración */
    .migrar-box { text-align: center; padding: 40px 20px; }
    .migrar-box p { color: var(--text2); margin-bottom: 20px; font-size: 14px; }
    .progress { background: var(--bg4); border-radius: 4px; height: 8px; margin: 16px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.3s; }
    
    /* Toast */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--green); color: var(--green); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 9999; display: none; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>📋 Gestor de Clientes</h1>
    <div class="nav">
      <button class="nav-btn active" onclick="setScreen('buscar')">🔍 Buscar</button>
      <button class="nav-btn" onclick="setScreen('venta')">➕ Venta</button>
      <button class="nav-btn" onclick="setScreen('listado')">👥 Listado</button>
      <button class="nav-btn" onclick="setScreen('stats')">📊 Stats</button>
    </div>
  </div>

  <div class="content">

    <!-- BUSCAR -->
    <div id="screen-buscar" class="screen active">
      <div class="search-box">
        <input type="text" id="buscador" placeholder="🔍 Buscar cliente..." oninput="onBuscar(this.value)" autocomplete="off">
        <div id="search-results" class="search-results" style="display:none"></div>
      </div>
      <div id="ficha-cliente"></div>
    </div>

    <!-- NUEVA VENTA -->
    <div id="screen-venta" class="screen">
      <div class="card">
        <div class="card-title">Registrar nueva venta</div>
        <div class="form-grid">
          <div class="form-group full">
            <label>Cliente</label>
            <input type="text" id="v-cliente" list="lista-clientes" placeholder="Nombre del cliente">
            <datalist id="lista-clientes"></datalist>
          </div>
          <div class="form-group full">
            <label>Producto</label>
            <input type="text" id="v-producto" placeholder="Nombre del producto">
          </div>
          <div class="form-group full">
            <label>Categoría</label>
            <input type="text" id="v-categoria" list="lista-categorias" placeholder="Categoría">
            <datalist id="lista-categorias"></datalist>
          </div>
          <div class="form-group">
            <label>Año</label>
            <input type="number" id="v-año" value="2026" min="2020" max="2030">
          </div>
          <div class="form-group">
            <label>Campaña</label>
            <input type="number" id="v-campaña" value="10" min="1" max="18">
          </div>
        </div>
        <button class="primary" onclick="agregarVenta()">✓ Registrar venta</button>
      </div>
    </div>

    <!-- LISTADO -->
    <div id="screen-listado" class="screen">
      <div class="filtros">
        <button class="filtro-btn active" onclick="setFiltro('todos', this)">Todos</button>
        <button class="filtro-btn" onclick="setFiltro('activo', this)">🟢 Activos</button>
        <button class="filtro-btn" onclick="setFiltro('contactar', this)">🟡 Contactar</button>
        <button class="filtro-btn" onclick="setFiltro('inactivo', this)">🔴 Inactivos</button>
      </div>
      <div id="lista-clientes-div"></div>
    </div>

    <!-- STATS -->
    <div id="screen-stats" class="screen">
      <div id="stats-contenido"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

let config = { añoActual: 2026, campañaActual: 10 };

// ── Utils ────────────────────────────────────────────────────────────
function campañasEntre(p1, p2) {
  const a1 = Math.floor(p1/100), c1 = p1%100;
  const a2 = Math.floor(p2/100), c2 = p2%100;
  return (a2 - a1) * 18 + (c2 - c1);
}

function periodoActual() {
  return config.añoActual * 100 + config.campañaActual;
}

function fmtPeriodo(p) {
  const a = Math.floor(p/100), c = p%100;
  return `Campaña ${c} - ${a}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// ── Datos calculados ─────────────────────────────────────────────────
function getClientes() {
  const porCliente = {};
  ventas.forEach(v => {
    if (!porCliente[v.cliente]) porCliente[v.cliente] = [];
    porCliente[v.cliente].push(v);
  });

  return Object.entries(porCliente).map(([nombre, compras]) => {
    const periodos = compras.map(c => parseInt(c.periodo));
    const primerPeriodo = Math.min(...periodos);
    const ultimoPeriodo = Math.max(...periodos);
    const campañasSin = campañasEntre(ultimoPeriodo, periodoActual());

    // Categorías
    const catCount = {};
    compras.forEach(c => { catCount[c.categoria] = (catCount[c.categoria]||0) + 1; });
    const catOrdenadas = Object.entries(catCount).sort((a,b) => b[1]-a[1]);

    // Productos más comprados
    const prodCount = {};
    compras.forEach(c => { prodCount[c.producto] = (prodCount[c.producto]||0) + 1; });
    const topProd = Object.entries(prodCount).sort((a,b) => b[1]-a[1]).slice(0,5);

    let estado;
    if (campañasSin <= 2) estado = '🟢 Activo';
    else if (campañasSin <= 5) estado = '🟡 Contactar';
    else estado = '🔴 Inactivo';

    return { nombre, compras, primerPeriodo, ultimoPeriodo, campañasSin, catOrdenadas, topProd, estado };
  }).sort((a,b) => a.nombre.localeCompare(b.nombre));
}

function getClienteNombre(nombre) {
  return getClientes().find(c => c.nombre.toUpperCase() === nombre.toUpperCase());
}

// ── Screens ──────────────────────────────────────────────────────────
function setScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  event.target.classList.add('active');

  if (name === 'listado') renderListado();
  if (name === 'stats') renderStats();
}

// ── Buscador ─────────────────────────────────────────────────────────
function onBuscar(q) {
  const res = document.getElementById('search-results');
  const ficha = document.getElementById('ficha-cliente');
  if (!q || q.length < 2) { res.style.display = 'none'; ficha.innerHTML = ''; return; }

  const clientes = getClientes();
  const matches = clientes.filter(c => c.nombre.toUpperCase().includes(q.toUpperCase())).slice(0, 8);

  if (matches.length === 0) { res.style.display = 'none'; return; }

  res.innerHTML = matches.map(c =>
    `<div class="search-item" onclick="seleccionarCliente('${c.nombre.replace(/'/g,"\'")}')">
      ${c.estado.split(' ')[0]} ${c.nombre}
      <span style="color:var(--text3);font-size:11px;float:right">${c.compras.length} productos</span>
    </div>`
  ).join('');
  res.style.display = 'block';
}

function seleccionarCliente(nombre) {
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('buscador').value = nombre;
  renderFicha(nombre);
}

      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Primera compra: ${fmtPeriodo(c.primerPeriodo)}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Última compra: ${fmtPeriodo(c.ultimoPeriodo)}</div>
    </div>

    <div class="card">
      <div class="card-title">❤️ Preferencias</div>
      <div style="margin-bottom:10px">
        ${c.catOrdenadas.slice(0,6).map(([cat,count],i) =>
          `<span class="tag tag-cat ${i===0?'top':''}">${i===0?'⭐ ':''}${cat} (${count})</span>`
        ).join('')}
      </div>
      <div class="card-title">Más comprados</div>
      ${c.topProd.map(([prod,count]) =>
        `<div style="font-size:12px;padding:3px 0;color:var(--text2)">· ${prod} <span style="color:var(--text3)">(${count})</span></div>`
      ).join('')}
    </div>

    ${alertas.length > 0 ? `
    <div class="card">
      <div class="card-title">💡 Alertas</div>
      ${alertas.map(a => `<div class="alerta ${a.tipo}">${a.tipo==='verde'?'🟢':a.tipo==='amarilla'?'🟡':'🔴'} ${a.msg}</div>`).join('')}
    </div>` : ''}

    <div class="card">
      <div class="card-title">🕐 Últimas compras</div>
      ${recientes.map(v =>
        `<div class="historial-item">
          <div>
            <div class="historial-producto">${v.producto}</div>
            <span class="historial-cat">${v.categoria}</span>
          </div>
          <div class="historial-meta">${fmtPeriodo(parseInt(v.periodo))}</div>
        </div>`
      ).join('')}
    </div>
  `;
}

// ── Listado ──────────────────────────────────────────────────────────
let filtroActual = 'todos';
function setFiltro(f, btn) {
  filtroActual = f;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

}

function renderListado() {
  let clientes = getClientes();
  if (filtroActual === 'activo') clientes = clientes.filter(c => c.estado.includes('Activo'));
  else if (filtroActual === 'contactar') clientes = clientes.filter(c => c.estado.includes('Contactar'));
  else if (filtroActual === 'inactivo') clientes = clientes.filter(c => c.estado.includes('Inactivo'));

  document.getElementById('lista-clientes-div').innerHTML = clientes.map(c => {
    const eClass = c.estado.includes('Activo') ? 'activo' : c.estado.includes('Contactar') ? 'contactar' : 'inactivo';
    return `<div class="cliente-row" onclick="irAFicha('${c.nombre.replace(/'/g,"\'")}')">
      <div class="cliente-info">
        <div class="cliente-nombre">${c.nombre}</div>
        <div class="cliente-meta">${c.compras.length} productos · Última: ${fmtPeriodo(c.ultimoPeriodo)}</div>
      </div>
      <span class="estado-badge estado-${eClass}">${c.estado}</span>
    </div>`;
  }).join('');
}

function irAFicha(nombre) {
  setScreen('buscar');
  document.querySelectorAll('.nav-btn')[0].classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i) => { if(i>0) b.classList.remove('active'); });
  document.getElementById('buscador').value = nombre;
  renderFicha(nombre);
}

// ── Stats ─────────────────────────────────────────────────────────────

  ventas.forEach(v => { catCount[v.categoria] = (catCount[v.categoria]||0) + 1; });

  const prodCount = {};
  ventas.forEach(v => { prodCount[v.producto] = (prodCount[v.producto]||0) + 1; });
  const topProds = Object.entries(prodCount).sort((a,b) => b[1]-a[1]).slice(0,8);

  document.getElementById('stats-contenido').innerHTML = `

// ── Nueva venta ──────────────────────────────────────────────────────
function poblarDataLists() {
  const clientes = [...new Set(ventas.map(v => v.cliente))].sort();
  const cats = [...new Set(ventas.map(v => v.categoria))].sort();

  document.getElementById('lista-clientes').innerHTML =
    clientes.map(c => `<option value="${c}">`).join('');
  document.getElementById('lista-categorias').innerHTML =
    cats.map(c => `<option value="${c}">`).join('');
}

async function agregarVenta() {
  const cliente = document.getElementById('v-cliente').value.trim().toUpperCase();
  const producto = document.getElementById('v-producto').value.trim();
  const categoria = document.getElementById('v-categoria').value.trim();
  const año = parseInt(document.getElementById('v-año').value);
  const campaña = parseInt(document.getElementById('v-campaña').value);

  if (!cliente || !producto || !categoria) {
    showToast('⚠️ Completá todos los campos');
    return;
  }

  const periodo = año * 100 + campaña;
  const nueva = { cliente, producto, categoria, año, campaña, periodo };
  ventas.push(nueva);

  // Intentar guardar en Sheets
  try {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'agregarVenta', ...nueva })
    });
  } catch(e) {}

  showToast('✓ Venta registrada');
  document.getElementById('v-cliente').value = '';
  document.getElementById('v-producto').value = '';
  document.getElementById('v-categoria').value = '';
  poblarDataLists();
}

// ── Migración a Sheets ───────────────────────────────────────────────
async function migrarASheets() {
  showToast('Migrando datos...');
  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'migrar', ventas: HISTORIAL_LOCAL })
    });
    migrado = true;
    showToast('✓ Datos migrados a Google Sheets');
  } catch(e) {
    showToast('⚠️ Error migrando: ' + e.message);
  }
}

// ── Init ──────────────────────────────────────────────────────────────
poblarDataLists();
</script>
